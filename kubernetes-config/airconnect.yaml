apiVersion: apps/v1
kind: Deployment
metadata:
  name: airconnect
  namespace: media
  labels: {app: airconnect}
spec:
  replicas: 1          # one instance is enough for all 5 amps
  selector:
    matchLabels: {app: airconnect}
  template:
    metadata:
      labels: {app: airconnect}
    spec:
      # 1️⃣ critical for multicast discovery
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
      - name: airconnect
        image: 1activegeek/airconnect:1.9.1
        # Optional tweaks:
        # -b <iface>      → bind to a specific NIC (use `ip -br a` to discover)
        # -l 1000:2000    → recommended Sonos latency (dev notes)
        env:
        # Kill the Chromecast bridge if you only care about Sonos
        - name: AIRCAST_VAR
          value: "kill"
        # TIP: drop -b to let AirConnect auto-bind; wrong iface causes 'Cannot start' on hostNetwork
        - name: AIRUPNP_VAR
          # Multi-zone (5–6 zones): larger latency window prevents underruns & keeps sync
          value: "-l 2500:4000 -Z -d all=info"
          # Optional: pin RTP ports if node firewall is strict → add: -g 40000:40100 and open that range
        resources:
          requests: {cpu: "1", memory: "1Gi"}
          limits: {cpu: "2", memory: "2Gi"}
        volumeMounts:
        - name: custom-init
          mountPath: /custom-cont-init.d
          readOnly: true
      volumes:
      - name: custom-init
        configMap:
          name: airconnect-init
          defaultMode: 0755
          items:
          - key: 10-libatomic.sh
            path: 10-libatomic.sh
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: airconnect-init
  namespace: media
data:
  10-libatomic.sh: |
    #!/command/with-contenv bash
    set -e
    echo "[custom-cont-init] installing libatomic..."
    if command -v apt-get >/dev/null 2>&1; then
      apt-get update
      apt-get install -y --no-install-recommends libatomic1
      apt-get clean
      rm -rf /var/lib/apt/lists/*
    elif command -v apk >/dev/null 2>&1; then
      apk add --no-cache libatomic
    else
      echo "[custom-cont-init] unknown base image; please install libatomic manually" >&2
    fi
    echo "[custom-cont-init] libatomic check complete"
---
# (Optional) keep related stuff together
apiVersion: v1
kind: Namespace
metadata:
  name: media
