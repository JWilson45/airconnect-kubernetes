apiVersion: apps/v1
kind: Deployment
metadata:
  name: airconnect
  namespace: media
  labels: {app: airconnect}
spec:
  replicas: 1          # one instance is enough for all 5 amps
  selector:
    matchLabels: {app: airconnect}
  template:
    metadata:
      labels: {app: airconnect}
    spec:
      # 1️⃣ critical for multicast discovery
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
      - name: airconnect
        image: 1activegeek/airconnect:1.9.3
        # Optional tweaks:
        # -b <iface>      → bind to a specific NIC (use `ip -br a` to discover)
        # -l 1000:2000    → recommended Sonos latency (dev notes)
        env:
        # Kill the Chromecast bridge if you only care about Sonos
        - name: AIRCAST_VAR
          value: "kill"
        # TIP: drop -b to let AirConnect auto-bind; wrong iface causes 'Cannot start' on hostNetwork
        - name: AIRUPNP_VAR
          # Slightly wider latency for legacy Connect:Amp stability; :f fills brief packet gaps with silence.
          # Auto-bind on the scheduled node, skip the native-AirPlay Arc, and keep inbound RTP/HTTP ports predictable.
          value: "-a 40000:128 -l 2000:4000:f -Z -m Arc -d all=warn"
          # If the node firewall is strict, allow TCP/UDP 40000-40127 from the LAN.
        resources:
          requests: {cpu: "1", memory: "1Gi"}
          limits: {cpu: "2", memory: "2Gi"}
---
# (Optional) keep related stuff together
apiVersion: v1
kind: Namespace
metadata:
  name: media
